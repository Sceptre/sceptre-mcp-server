[tox]
isolated_build = true
envlist = py{310,311,312,313},coverage
skip_missing_interpreters = true

# set for poetry to manages dependencies in tox testenv targets
# (https://python-poetry.org/docs/faq/#usecase-3)

[testenv]
skip_install = true
allowlist_externals = poetry
commands_pre =
    poetry install --all-extras -v
commands =
    poetry run pytest {posargs}

[testenv:coverage]
skip_install = true
allowlist_externals = poetry
basepython = python3.12
commands_pre =
    poetry install --all-extras -v
commands =
    poetry run pytest --cov=sceptre_mcp_server --cov-report=term-missing --cov-fail-under=90 {posargs}
